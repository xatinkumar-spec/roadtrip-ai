<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef4ff, #f8fbff);
            color: #1f2937;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
        }

        .card {
            background: white;
            border-radius: 22px;
            padding: 30px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.10);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #2563eb;
            font-size: 36px;
        }

        .sub-text {
            color: #475569;
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .chat-box {
            margin-top: 25px;
            background: #f8fafc;
            border: 1px solid #dbeafe;
            border-radius: 18px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 16px;
        }

        .message strong {
            color: #0f172a;
        }

        .user-message {
            background: #eff6ff;
            border-left: 4px solid #2563eb;
            padding: 12px 14px;
            border-radius: 12px;
        }

        .ai-message {
            background: #f8fafc;
            border-left: 4px solid #7c3aed;
            padding: 12px 14px;
            border-radius: 12px;
        }

        .thinking {
            color: #7c3aed;
            font-weight: bold;
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .input-row input {
            flex: 1;
            min-width: 220px;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .input-row input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .btn {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            border: none;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s ease;
            margin-top: 12px;
        }

        .btn:hover {
            opacity: 0.95;
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }

        .ai-response {
            margin-top: 12px;
            background: #f8fbff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            padding: 20px;
            line-height: 1.8;
            color: #1f2937;
            white-space: normal;
        }

        .ai-response h2 {
            font-size: 28px;
            color: #1d4ed8;
            margin-top: 0;
            margin-bottom: 14px;
        }

        .ai-response h3 {
            font-size: 22px;
            color: #4338ca;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .ai-response strong {
            font-weight: bold;
            color: #111827;
        }

        .ai-response ul {
            padding-left: 22px;
            margin-top: 8px;
            margin-bottom: 14px;
        }

        .ai-response li {
            margin-bottom: 8px;
            font-size: 16px;
        }

        .ai-response p {
            margin-bottom: 12px;
            font-size: 16px;
            color: #334155;
        }

        #successMessage {
            display: none;
            margin-top: 15px;
            color: #166534;
            font-weight: bold;
            background: #dcfce7;
            border: 1px solid #22c55e;
            padding: 12px 14px;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container {
                width: 94%;
            }

            .card {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .sub-text {
                font-size: 15px;
            }

            .input-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🤖 AI Travel Assistant</h1>
            <p class="sub-text">Talk with AI, choose places, and plan your trip smartly.</p>

            <div class="chat-box" id="chatBox">
                <div class="message ai-message">
                    <strong>AI:</strong> Hello! Tell me your destination, budget, and days for travel.
                </div>
            </div>

            <div class="input-row">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Example: Plan a 3 day trip to Mysore and Coorg under 15000"
                >
                <button class="btn" onclick="sendMessage()">Send</button>
            </div>

            <div id="successMessage">
                ✅ Trip Saved Successfully!
            </div>

            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
    let lastAIPlan = "";
    let lastUserPrompt = "";

        function formatDestinations(text) {
        let lines = text.split("\n");
        let html = `<div class="ai-response"><h2>Recommended Destinations</h2>`;
        let foundPlaces = false;
        let inCostSection = false;
        let costHtml = "";

        lines.forEach(line => {
            line = line.trim();
            if (!line) return;

            if (line.toLowerCase().includes("recommended destinations")) {
                return;
            }

            if (line.toLowerCase().includes("trip cost summary")) {
                inCostSection = true;
                costHtml += `<h3 style="margin-top:20px; color:#16a34a;">💰 Trip Cost Summary</h3>`;
                return;
            }

            if (inCostSection) {
                if (line.startsWith("-") || line.startsWith("•")) {
                    let cleanCost = line.replace(/^[-•]\s*/, "").trim();
                    costHtml += `<p style="margin:6px 0; color:#334155;">${cleanCost}</p>`;
                }
                return;
            }

            if (line.startsWith("-") || line.startsWith("•")) {
                let clean = line
                    .replace(/^[-•]\s*/, "")
                    .replace(/\*\*/g, "")
                    .trim();

                if (
                    clean.toLowerCase().includes("street food") ||
                    clean.toLowerCase().includes("shopping") ||
                    clean.toLowerCase().includes("nightlife") ||
                    clean.toLowerCase().includes("water activities") ||
                    clean.toLowerCase().includes("personal expenses") ||
                    clean.toLowerCase().includes("activities extra")
                ) {
                    return;
                }

                let placeName = clean.split("|")[0].trim();

                foundPlaces = true;

                html += `
                    <label style="display:block; margin-bottom:10px;">
                        <input type="checkbox" value="${clean.split('|')[0].split(':')[0].trim()}" class="place-checkbox">
                        ${clean}
                    </label>
                `;
            }
        });

        if (foundPlaces) {
            html += `<button class="btn" onclick="saveSelectedPlaces()">Continue</button>`;
        } else {
            html += `<p>${text}</p>`;
        }

        html += costHtml;
        html += `</div>`;
        return html;
    }

    function extractBudgetFromPrompt(prompt) {
        const match = prompt.match(/under\s+(\d+)|budget\s+(\d+)|₹\s*(\d+)|rs\.?\s*(\d+)/i);
        if (match) {
            return parseInt(match[1] || match[2] || match[3] || match[4]);
        }
        return "";
    }

    function extractDaysFromPrompt(prompt) {
        const match = prompt.match(/(\d+)\s*day/i);
        if (match) {
            return parseInt(match[1]);
        }
        return "";
    }

    function extractEntryFee(text) {
        const match = text.match(/Total Entry Fee:\s*₹?\s*(\d+)/i);
        if (match) {
            return parseInt(match[1]);
        }
        return 0;
    }

    function extractCostSummary(text) {
        let lines = text.split("\n");
        let summary = [];
        let inCostSection = false;

        lines.forEach(line => {
            line = line.trim();
            if (!line) return;

            if (line.toLowerCase().includes("trip cost summary")) {
                inCostSection = true;
                summary.push("Trip Cost Summary:");
                return;
            }

            if (inCostSection) {
                if (line.startsWith("-") || line.startsWith("•")) {
                    summary.push(line.replace(/^[-•]\s*/, "").trim());
                }
            }
        });

        return summary.join("\n");
    }

    function extractCountryFromPrompt(prompt) {
        const countries = [
            "India", "Nepal", "Bhutan", "Thailand", "United Arab Emirates",
            "United States", "United Kingdom", "Canada", "Australia", "Germany",
            "France", "Italy", "Japan", "South Korea", "Singapore", "Malaysia",
            "Indonesia", "Sri Lanka", "Maldives", "Saudi Arabia", "Qatar",
            "Turkey", "Spain", "Netherlands", "Switzerland", "Sweden",
            "Norway", "Brazil", "Argentina", "South Africa", "Egypt"
        ];

        const lowerPrompt = prompt.toLowerCase();

        for (let country of countries) {
            if (lowerPrompt.includes(country.toLowerCase())) {
                return country;
            }
        }

        return "India";
    }

    function saveSelectedPlaces() {
        let selected = [];

        document.querySelectorAll(".place-checkbox:checked").forEach(cb => {
            selected.push(cb.value);
        });

        if (selected.length === 0) {
            alert("Please select at least one place");
            return;
        }

        localStorage.setItem("selectedPlaces", JSON.stringify(selected));
        localStorage.setItem("selectedBudget", extractBudgetFromPrompt(lastUserPrompt));
        localStorage.setItem("selectedDays", extractDaysFromPrompt(lastUserPrompt));
        localStorage.setItem("selectedPrompt", lastUserPrompt);
        localStorage.setItem("selectedCountry", extractCountryFromPrompt(lastUserPrompt));
        localStorage.setItem("entryFee", extractEntryFee(lastAIPlan));
        localStorage.setItem("costSummary", extractCostSummary(lastAIPlan));

        window.location.href = "/trips/create/";
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const message = input.value.trim();
        const successMessage = document.getElementById("successMessage");

        if (!message) return;

        lastUserPrompt = message;

        if (successMessage) {
            successMessage.style.display = "none";
        }

        chatBox.innerHTML += `
            <div class="message user-message">
                <strong>You:</strong> ${message}
            </div>
        `;

        chatBox.innerHTML += `
            <div class="message ai-message" id="loadingMessage">
                <strong class="thinking">AI:</strong> Thinking...
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

        fetch(`/trips/ai-trip/?prompt=${encodeURIComponent(message)}`)
            .then(res => res.json())
            .then(data => {
                console.log("API response:", data);

                const loading = document.getElementById("loadingMessage");
                if (loading) loading.remove();

                if (data.result) {
                    lastAIPlan = data.result;

                    const providerText = data.provider
                        ? ` <small style="color:gray;">(${data.provider})</small>`
                        : "";

                    chatBox.innerHTML += `
                        <div class="message ai-message">
                            <strong>AI:</strong>${providerText}
                            ${formatDestinations(data.result)}
                        </div>
                    `;
                } else if (data.error) {
                    chatBox.innerHTML += `
                        <div class="message ai-message">
                            <strong>AI Error:</strong> ${data.error}
                        </div>
                    `;
                } else {
                    chatBox.innerHTML += `
                        <div class="message ai-message">
                            <strong>AI:</strong> No valid response received.
                        </div>
                    `;
                }

                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(error => {
                console.error("Fetch error:", error);

                const loading = document.getElementById("loadingMessage");
                if (loading) loading.remove();

                chatBox.innerHTML += `
                    <div class="message ai-message">
                        <strong>AI:</strong> Something went wrong.
                    </div>
                `;

                chatBox.scrollTop = chatBox.scrollHeight;
            });

        input.value = "";
    }

    document.getElementById("userInput").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>
