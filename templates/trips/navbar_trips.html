<style>
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    z-index: 999;
}

/* glossy effect */
.navbar::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: rgba(255,255,255,0.08);
}

.navbar a {
    color: #e0e7ff;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    transition: 0.3s;
}

.navbar a:hover {
    color: white;
    transform: translateY(-2px);
}
</style>

<div class="navbar">
    <a href="/">🏠 Home</a>
    <a href="{% url 'trip_list' %}">📍 My Trips</a>
    <a href="{% url 'create_trip' %}">➕ New Trip</a>
</div>
