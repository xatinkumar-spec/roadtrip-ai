<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }
        .box {
            width: 420px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #1e3a8a;
        }
        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Password Reset Successful</h2>
        <p>Your password has been changed successfully.</p>
        <p><a href="/users/login/">Go to Login</a></p>
    </div>
</body>
</html>
